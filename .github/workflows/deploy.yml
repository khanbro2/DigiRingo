name: Deploy web to digiringo.com

# Builds the production web bundle in the cloud and ships it to Hostinger over
# SSH. Runs from GitHub's runners (a fresh IP every time) so it NEVER trips the
# host's fail2ban/SSH throttle the way repeated local scp does. One-time setup:
# add a repo secret `HOSTINGER_SSH_KEY` = the full contents of the private deploy
# key (~/.ssh/digiringo_deploy). Then every push to main auto-deploys; you can
# also trigger it manually from the Actions tab ("Run workflow").

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "server/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.*"
      - ".env.production"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Never let two deploys overlap.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets (production / live)
        run: pnpm build

      - name: Set up SSH deploy key
        run: |
          mkdir -p ~/.ssh
          # `tr -d '\r'` repairs a key pasted from a Windows editor (CRLF would
          # otherwise corrupt it and SSH auth fails).
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy over SSH (tar — no rsync dependency)
        env:
          SSH_HOST: 153.92.10.88
          SSH_USER: u545142772
          SSH_PORT: "65002"
          BASE: domains/digiringo.com/public_html
        run: |
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::HOSTINGER_SSH_KEY is not a valid private key — re-copy the ENTIRE key incl. BEGIN/END lines."
            exit 1
          fi
          SSH="ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=15 -o ConnectTimeout=25 $SSH_USER@$SSH_HOST"
          # Hostinger intermittently resets an authenticated session (fail2ban-ish).
          # Auth itself works, so just retry each op a few times with a backoff.
          retry() { local n; for n in 1 2 3 4 5; do if "$@"; then return 0; fi; echo "  …reset, retry $n/5"; sleep 8; done; return 1; }
          ship_dist() { tar czf - -C dist . | $SSH "mkdir -p $BASE/dist && tar xzf - -C $BASE/dist --no-same-owner"; }
          ship_srv()  { tar czf - server/*.mjs server/migrations/*.sql | $SSH "tar xzf - -C $BASE --no-same-owner"; }
          restart()   { $SSH "mkdir -p $BASE/tmp && touch $BASE/tmp/restart.txt && echo RESTARTED"; }
          echo '→ SSH auth (with retry)…';        retry $SSH 'echo SSH_OK'  || { echo "::error::SSH unreachable after 5 tries"; exit 1; }
          echo '→ shipping front-end (dist)…';     retry ship_dist          || { echo "::error::dist transfer failed after 5 tries"; exit 1; }
          echo '→ shipping server code…';          retry ship_srv           || { echo "::error::server transfer failed after 5 tries"; exit 1; }
          echo '→ restarting Node app…';           retry restart            || { echo "::error::restart failed after 5 tries"; exit 1; }
          echo '✓ deployed + restarted'

      - name: Verify
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w '%{http_code}' https://digiringo.com/app || echo "000")
          echo "digiringo.com/app → $code"
          bundle=$(curl -s "https://digiringo.com/app?cb=$(date +%s)" | grep -oE 'main-[A-Za-z0-9_-]+\.js' | head -1)
          echo "live bundle: $bundle"
