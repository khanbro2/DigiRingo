name: Deploy web to digiringo.com

# Builds the production web bundle in the cloud and ships it to Hostinger over
# SSH. Runs from GitHub's runners (a fresh IP every time) so it NEVER trips the
# host's fail2ban/SSH throttle the way repeated local scp does. One-time setup:
# add a repo secret `HOSTINGER_SSH_KEY` = the full contents of the private deploy
# key (~/.ssh/digiringo_deploy). Then every push to main auto-deploys; you can
# also trigger it manually from the Actions tab ("Run workflow").

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "server/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.*"
      - ".env.production"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Never let two deploys overlap.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A stuck step used to sit in `in_progress` until GitHub's 6-hour default
    # killed it, blocking every later deploy behind the concurrency group.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets (production / live)
        run: pnpm build

      - name: Set up SSH deploy key
        run: |
          mkdir -p ~/.ssh
          # `tr -d '\r'` repairs a key pasted from a Windows editor (CRLF would
          # otherwise corrupt it and SSH auth fails).
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # lftp is not a speed choice — it's the only option. Hostinger kills remote
      # SHELL sessions from datacenter IPs (so rsync / tar-over-ssh can't work)
      # but leaves the SFTP subsystem open, which is what lftp drives here.
      #
      # `apt-get update` is the slow, flaky part: one run hung on it for 10+
      # minutes. The runner image already ships a usable package index, so try a
      # bare install first and only refresh the lists if that misses. Both are
      # under `timeout` so a hung mirror fails in seconds instead of stalling the
      # job for hours.
      - name: Install lftp
        run: |
          if timeout 120 sudo apt-get install -y -qq lftp; then
            echo "lftp installed from the cached package index"
          else
            echo "cached index missed — refreshing"
            timeout 240 sudo apt-get update -qq
            timeout 180 sudo apt-get install -y -qq lftp
          fi
          lftp --version | head -1

      - name: Deploy via SFTP (no remote shell — Hostinger kills shell sessions
              from datacenter IPs, but the SFTP subsystem is allowed)
        env:
          SSH_HOST: 153.92.10.88
          SSH_USER: u545142772
          SSH_PORT: "65002"
          BASE: domains/digiringo.com/public_html
        run: |
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::HOSTINGER_SSH_KEY is not a valid private key — re-copy the ENTIRE key incl. BEGIN/END lines."
            exit 1
          fi
          date > restart.txt
          CP="ssh -a -x -i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=25"
          # `cmd:fail-exit yes` is what makes a failed mirror actually fail the
          # step. Without it lftp kept going after "mirror: Fatal error:
          # max-retries exceeded", still exited 0, and the job reported success
          # while dist/ had never been uploaded — the site silently stayed stale.
          # Each mirror is its own lftp invocation so `set -e` catches it and the
          # log shows exactly which one died.
          run_lftp() {
            lftp -c "
              set cmd:fail-exit yes;
              set sftp:connect-program \"$CP\";
              set sftp:auto-confirm yes;
              set net:max-retries 6; set net:timeout 25; set net:reconnect-interval-base 8;
              set mirror:parallel-transfer-count 1;
              open -u \"$SSH_USER,\" sftp://$SSH_HOST;
              $1;
              bye
            "
          }
          # Hostinger drops long sessions, so give the big dist mirror 3 attempts;
          # each resumes where the last left off.
          for attempt in 1 2 3; do
            echo "── dist mirror, attempt $attempt"
            if run_lftp "mirror -R --delete --verbose dist/ \"$BASE/dist/\""; then break; fi
            if [ "$attempt" = 3 ]; then echo "::error::dist/ upload failed after 3 attempts"; exit 1; fi
            sleep 20
          done
          run_lftp "mirror -R --verbose --include-glob=*.mjs server/ \"$BASE/server/\""
          run_lftp "mirror -R --verbose --include-glob=*.sql server/migrations/ \"$BASE/server/migrations/\""
          run_lftp "put -O \"$BASE/tmp/\" restart.txt"
          echo '✓ deployed via SFTP + restart triggered'

      - name: Verify
        run: |
          sleep 8
          code=$(curl -s -o /dev/null -w '%{http_code}' https://digiringo.com/app || echo "000")
          echo "digiringo.com/app → $code"
          # Assert the LIVE bundle is the one we just built. A stale hash means the
          # upload silently didn't land, which is exactly the failure that shipped
          # a renamed site to nobody.
          want=$(grep -oE 'main-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          live=$(curl -s "https://digiringo.com/app?cb=$(date +%s)" | grep -oE 'main-[A-Za-z0-9_-]+\.js' | head -1)
          echo "built: $want"
          echo "live : $live"
          if [ -z "$live" ] || [ "$want" != "$live" ]; then
            echo "::error::live bundle ($live) does not match the build ($want) — deploy did not land"
            exit 1
          fi
          echo "✓ live bundle matches the build"
