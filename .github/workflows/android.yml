name: Build Android App (APK)

# Builds an installable DGRINGO debug APK in the cloud — no local Android toolchain
# needed. Runs on every push to main, or on demand via the "Run workflow" button.
# The APK is attached to the run as a downloadable artifact ("dgringo-apk").

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets (native mode)
        run: pnpm build:mobile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Capacitor sync
        # Use pnpm exec (not npx) so the local @capacitor/cli binary resolves in
        # pnpm's node_modules. `sync` also regenerates capacitor.settings.gradle
        # with paths matching THIS runner's install.
        run: pnpm exec cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dgringo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
