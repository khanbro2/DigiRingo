name: Build Android App (APK)

# Builds an installable DGRINGO debug APK in the cloud — no local Android toolchain
# needed. Runs on every push to main, or on demand via the "Run workflow" button.
# The APK is attached to the run as a downloadable artifact ("dgringo-apk").

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets (native mode)
        run: pnpm build:mobile

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Capacitor sync
        # Use pnpm exec (not npx) so the local @capacitor/cli binary resolves in
        # pnpm's node_modules. `sync` also regenerates capacitor.settings.gradle
        # with paths matching THIS runner's install.
        run: pnpm exec cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dgringo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # --- Play Store bundle -------------------------------------------------
      # Only runs once the four signing secrets exist, so pushes keep producing a
      # debug APK until the keystore is configured. Google Play accepts .aab only.
      - name: Check signing secrets
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"
          else echo "ready=false" >> "$GITHUB_OUTPUT"; echo "::notice::ANDROID_KEYSTORE_BASE64 not set — skipping the release bundle."; fi

      - name: Decode keystore
        if: steps.signing.outputs.ready == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Build release AAB
        if: steps.signing.outputs.ready == 'true'
        env:
          DGRINGO_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          DGRINGO_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          DGRINGO_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          DGRINGO_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dgringo-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.jks"
