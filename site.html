<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIGIRINGO — A second phone number for a borderless world</title>
    <meta
      name="description"
      content="DIGIRINGO gives you real local phone numbers in 8+ countries. Call, text and manage everything from one beautifully simple app — no SIM, no contract."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before first paint to avoid a flash of the wrong theme.
      // Default is LIGHT.
      try {
        var t = localStorage.getItem("dg-theme");
        document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    </script>
    <style>
      html, body { margin: 0; background: #ffffff; }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #05070d; }
      #root { min-height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/site.tsx"></script>
  </body>
</html>
